<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>수능특강 셀프분석 + 셀프해설지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ===================== RESET & BASE ===================== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C2B4A;
  --ink2:#2D3F60;
  --gold:#B8862A;
  --gold2:#F5EDD6;
  --gold3:#E8D5A0;
  --cream:#F6F1E8;
  --paper:#FDFAF5;
  --lit:#5B3A8C;
  --lit2:#F0EAF8;
  --lit3:#D4C3EE;
  --read:#1A6B5C;
  --read2:#E6F4F1;
  --read3:#B0D9D2;
  --red:#C0392B;
  --red2:#FDEEEC;
  --green:#1E7A4A;
  --green2:#E8F7EE;
  --yellow:#C47A00;
  --yellow2:#FEF8E8;
  --border:#DDD5C2;
  --border2:#EDE8DF;
  --t2:#6B6254;
  --t3:#A09786;
  --card:#FDFAF5;
  --r:12px;
  --shadow:0 2px 12px rgba(28,43,74,.09);
  --shadow2:0 4px 24px rgba(28,43,74,.13);
}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4963a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
input,textarea,select,button{font-family:inherit}
textarea{resize:none}
.hide{display:none!important}
.page{max-width:620px;margin:0 auto;padding-bottom:120px}
.inner{padding:0 16px}

/* ===================== HEADER ===================== */
.app-hd{
  background:var(--ink);
  padding:0 16px;
  position:sticky;top:0;z-index:80;
  display:flex;align-items:center;justify-content:space-between;
  height:54px;
  box-shadow:0 2px 16px rgba(28,43,74,.25);
}
.app-hd .logo-r{display:flex;align-items:center;gap:10px}
.app-hd img{height:28px;object-fit:contain;filter:brightness(0) invert(1);opacity:.9}
.app-hd .brand h1{
  font-family:'Noto Serif KR',serif;
  font-size:13.5px;font-weight:700;
  color:#fff;line-height:1.2;letter-spacing:-.01em;
}
.app-hd .brand p{font-size:9px;font-weight:500;color:var(--gold3);letter-spacing:.15em;text-transform:uppercase;margin-top:1px}
.mode-chip{
  font-size:10px;font-weight:700;
  padding:4px 12px;border-radius:99px;
  background:rgba(184,134,42,.25);
  color:var(--gold3);
  border:1px solid rgba(184,134,42,.35);
  letter-spacing:.05em;
}
.mini-tools{display:flex;gap:6px}
.mini-tool-btn{
  font-size:11px;font-weight:700;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.85);
  border-radius:8px;padding:6px 10px;cursor:pointer;
  transition:all .18s;
}
.mini-tool-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}

/* ===================== TOAST ===================== */
#toast{
  position:fixed;bottom:130px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:#fff;
  padding:10px 22px;border-radius:99px;
  font-size:12.5px;font-weight:700;
  opacity:0;transition:all .28s;pointer-events:none;
  white-space:nowrap;z-index:300;
  border:1px solid rgba(184,134,42,.3);
  box-shadow:0 8px 32px rgba(28,43,74,.3);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===================== CARDS ===================== */
.card{
  background:var(--card);
  border:1.5px solid var(--border2);
  border-radius:var(--r);
  padding:18px;margin-bottom:12px;
  box-shadow:var(--shadow);
}
.card-ttl{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;color:var(--ink);
}
.card-ttl::before{
  content:'';width:3px;height:14px;
  background:var(--gold);border-radius:2px;flex-shrink:0;
}
.card-ttl.lit-ttl{color:var(--lit)}.card-ttl.lit-ttl::before{background:var(--lit)}
.card-ttl.read-ttl{color:var(--read)}.card-ttl.read-ttl::before{background:var(--read)}
.card-ttl.expl-ttl{color:#0891b2}.card-ttl.expl-ttl::before{background:#0891b2}

/* ===================== FORM ELEMENTS ===================== */
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
label.lbl{
  display:block;font-size:10px;font-weight:700;
  color:var(--t2);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:5px;
}
.inp{
  width:100%;border:1.5px solid var(--border);
  border-radius:9px;padding:9px 12px;
  font-size:13px;background:var(--paper);
  transition:border-color .18s,box-shadow .18s;
  color:var(--ink);line-height:1.6;
}
.inp:focus{outline:none;box-shadow:0 0 0 3px rgba(184,134,42,.12)}
.inp.lit:focus{border-color:var(--lit);box-shadow:0 0 0 3px rgba(91,58,140,.1)}
.inp.read:focus{border-color:var(--read);box-shadow:0 0 0 3px rgba(26,107,92,.1)}
.inp:focus:not(.lit):not(.read){border-color:var(--gold)}
.inp.sm{padding:7px 10px;font-size:12.5px}
.inp:disabled{background:#f4f1eb;color:var(--t2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:7px}

/* ===================== TYPE TOGGLE ===================== */
.type-tgl{display:flex;gap:7px;margin-bottom:14px}
.type-btn{
  flex:1;padding:10px 8px;
  border:1.5px solid var(--border);
  border-radius:10px;font-size:12.5px;font-weight:700;
  background:var(--paper);color:var(--t3);cursor:pointer;
  transition:all .2s;display:flex;flex-direction:column;
  align-items:center;gap:3px;
}
.type-btn .tb-icon{font-size:20px}
.type-btn .tb-lbl{font-size:10.5px}
.type-btn.on-lit{background:var(--lit2);border-color:var(--lit);color:var(--lit)}
.type-btn.on-read{background:var(--read2);border-color:var(--read);color:var(--read)}

/* ===================== TOGGLE BUTTONS ===================== */
.tgl-row{display:flex;gap:5px}
.tgl-btn{
  flex:1;padding:7px;border:1.5px solid var(--border);
  border-radius:8px;font-size:11.5px;font-weight:700;
  background:var(--paper);color:var(--t3);cursor:pointer;transition:all .18s;
}
.tgl-btn.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* ===================== STATUS BUTTONS ===================== */
.st-row{display:flex;gap:5px}
.st-btn{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--paper);
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:12px;
  transition:all .18s;flex-shrink:0;
}
.st-btn.on-c{background:var(--green);border-color:var(--green);color:#fff}
.st-btn.on-u{background:var(--yellow);border-color:var(--yellow);color:#fff}
.st-btn.on-w{background:var(--red);border-color:var(--red);color:#fff}

/* ===================== PASSAGE PANEL ===================== */
.passage-panel{border-radius:var(--r);margin-bottom:12px;overflow:hidden;border:1.5px solid var(--border)}
.passage-panel.lit{border-color:var(--lit3)}
.passage-panel.read{border-color:var(--read3)}
.passage-toggle{
  width:100%;padding:12px 16px;border:none;
  background:var(--paper);display:flex;
  align-items:center;justify-content:space-between;
  cursor:pointer;font-size:13px;font-weight:700;
}
.passage-toggle.lit{color:var(--lit)}
.passage-toggle.read{color:var(--read)}
.passage-toggle .pt-icon{font-size:14px;transition:transform .25s}
.passage-toggle.open .pt-icon{transform:rotate(180deg)}
.passage-body{max-height:0;overflow:hidden;transition:max-height .35s ease;background:#
