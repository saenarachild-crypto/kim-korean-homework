<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>수능특강 셀프분석 + 셀프해설지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ===================== RESET & BASE ===================== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C2B4A; --ink2:#2D3F60; --gold:#B8862A; --gold2:#F5EDD6; --gold3:#E8D5A0;
  --cream:#F6F1E8; --paper:#FDFAF5; --lit:#5B3A8C; --lit2:#F0EAF8; --lit3:#D4C3EE;
  --read:#1A6B5C; --read2:#E6F4F1; --read3:#B0D9D2; --red:#C0392B; --red2:#FDEEEC;
  --green:#1E7A4A; --green2:#E8F7EE; --yellow:#C47A00; --yellow2:#FEF8E8;
  --border:#DDD5C2; --border2:#EDE8DF; --t2:#6B6254; --t3:#A09786; --card:#FDFAF5;
  --r:12px; --shadow:0 2px 12px rgba(28,43,74,.09); --shadow2:0 4px 24px rgba(28,43,74,.13);
}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif; background:var(--cream); color:var(--ink); min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4963a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.page{max-width:620px;margin:0 auto;padding-bottom:120px}
.inner{padding:0 16px}
.hide{display:none!important}

/* ===================== HEADER ===================== */
.app-hd{
  background:var(--ink); padding:0 16px; position:sticky; top:0; z-index:80;
  display:flex; align-items:center; justify-content:space-between; height:54px;
  box-shadow:0 2px 16px rgba(28,43,74,.25);
}
.app-hd img{height:28px; filter:brightness(0) invert(1); opacity:.9}
.app-hd .brand h1{font-family:'Noto Serif KR',serif; font-size:13.5px; font-weight:700; color:#fff; line-height:1.2;}
.app-hd .brand p{font-size:9px; font-weight:500; color:var(--gold3); letter-spacing:.15em; text-transform:uppercase;}
.mode-chip{font-size:10px; font-weight:700; color:#fff; padding:3px 9px; border-radius:99px; background:var(--gold);}

/* ===================== COMPONENTS ===================== */
.card{background:var(--card); border:1.5px solid var(--border2); border-radius:var(--r); padding:20px; box-shadow:var(--shadow);}
.lbl{font-size:12px; font-weight:700; color:var(--t2); margin-bottom:6px; display:block;}
.inp{width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:9px; background:var(--paper); font-size:13px; color:var(--ink);}
.btn{display:inline-block; padding:12px 20px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; border:none; width:100%;}
.btn-gold{background:var(--gold); color:white;}
.btn-finish{background:var(--ink); color:white; margin-top:20px; font-size:15px;}

.tabs{display:flex; border-bottom:1.5px solid var(--border2); margin-bottom:20px;}
.tab-btn{flex:1; padding:14px 0; text-align:center; font-size:13px; font-weight:700; color:var(--t3); border:none; background:none; border-bottom:2px solid transparent; cursor:pointer;}
.tab-btn.active{color:var(--ink); border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.s-tabs{display:flex; gap:8px; overflow-x:auto; padding:12px 0;}
.s-tab-btn{padding:8px 14px; background:var(--lit2); color:var(--lit); font-size:12px; border-radius:99px; border:none; white-space:nowrap; cursor:pointer;}
.s-tab-btn.active{background:var(--lit); color:white;}

#toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:99px; font-size:13px; z-index:1000; display:none;}

/* ===================== RESULTS ===================== */
.res-item{margin-bottom:15px; padding:15px; background:white; border-radius:10px; border:1.5px solid var(--border2);}
.res-title{font-weight:800; color:var(--ink); margin-bottom:5px;}
.res-link{font-size:12px; color:var(--gold); text-decoration:none; word-break:break-all;}
</style>
</head>
<body>

<header class="app-hd">
  <div style="display:flex; align-items:center; gap:10px">
    <img src="https://storage.googleapis.com/static.run.app/v1/projects/ais-dev-fuzhsbwwctarhrqxe7mief/images/67c5496464f899002c9a9616/1741007204481-%EA%B9%80%ED%98%84%EC%84%9D%EA%B5%AD%EC%96%B4_%EB%A1%9C%EA%B3%A0.png" alt="Logo">
    <div class="brand"><h1>수능특강 셀프분석</h1><p>Integrated Self-Study Note</p></div>
  </div>
  <span id="mode-chip" class="mode-chip">학생용</span>
</header>

<div id="view-student" class="page">
  <div class="inner">
    <div style="padding:20px 0;">
      <label class="lbl">학생 이름</label>
      <input id="s-name" class="inp" placeholder="이름을 입력하세요" oninput="saveName()">
    </div>
    
    <div id="s-tabs" class="s-tabs"></div>

    <div id="form-container">
      </div>

    <div id="expl-container" style="margin-top:30px;">
      </div>

    <button onclick="goReview()" class="btn btn-finish">✨ 분석 완료 및 결과 보기</button>
  </div>
</div>

<div id="view-review" class="page hide">
  <div class="inner">
    <div style="padding:20px 0;">
      <h2 style="font-size:18px;">분석 결과 확인</h2>
      <p style="font-size:13px; color:var(--t3);">작성한 내용을 확인하고 보고서를 복사하세요.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)">지문 분석</button>
      <button class="tab-btn" onclick="switchTab(1)">오답 해설지</button>
    </div>

    <div id="r-analysis-content" class="tab-panel active"></div>
    <div id="r-expl-content" class="tab-panel"></div>

    <div style="position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:620px; padding:15px; background:var(--cream); display:flex; gap:10px;">
      <button onclick="copyKakaoReport()" class="btn btn-gold" style="flex:2">💬 카카오톡 보고서 복사</button>
      <button onclick="location.reload()" class="btn" style="flex:1; background:var(--border)">🔄 다시 수정</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const toast = msg => { const t=$('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); };

// 임시 테스트 데이터 (현석 님의 파이썬 생성기에서 주입될 데이터 구조)
window.__BAKED_ASGN__ = window.__BAKED_ASGN__ || {
  title: "2026 수능특강 문학 - 현대시 01",
  passages: [
    { title: "초혼", author: "김소월", type: "lit" },
    { title: "추일서정", author: "김광균", type: "lit" }
  ],
  questions: [
    { num: 1, ans: 3, label: "작품의 공통점" },
    { num: 2, ans: 5, label: "시어의 의미" },
    { num: 3, ans: 2, label: "외적 준거에 따른 감상" }
  ]
};

let ASGN = window.__BAKED_ASGN__;
let DATA = JSON.parse(localStorage.getItem('data_'+ASGN.title) || '[]');
let EXPL = JSON.parse(localStorage.getItem('expl_'+ASGN.title) || '[]');
let CUR = 0;

function saveName() { localStorage.setItem('s_name', $('s-name').value); }

function init() {
  $('s-name').value = localStorage.getItem('s_name') || '';
  renderTabs();
  renderPassage(0);
  renderExplanations();
}

function renderTabs() {
  const wrap = $('s-tabs');
  wrap.innerHTML = ASGN.passages.map((p, i) => 
    `<button class="s-tab-btn ${i===CUR?'active':''}" onclick="changePassage(${i})">${i+1}. ${p.title}</button>`
  ).join('');
}

function changePassage(idx) {
  saveCurrentData();
  CUR = idx;
  renderTabs();
  renderPassage(idx);
}

function renderPassage(idx) {
  const p = ASGN.passages[idx];
  const d = DATA[idx] || { problemLink: '', explanationLink: '', flow: '' };
  
  $('form-container').innerHTML = `
    <div class="card" style="margin-top:10px;">
      <h3 style="margin-bottom:15px;">📖 ${p.title} (${p.author})</h3>
      <div style="margin-bottom:12px;">
        <label class="lbl">📄 문제지 링크</label>
        <input id="p-link" class="inp" value="${d.problemLink}" placeholder="https://...">
      </div>
      <div style="margin-bottom:12px;">
        <label class="lbl">📘 해설지 링크</label>
        <input id="e-link" class="inp" value="${d.explanationLink}" placeholder="https://...">
      </div>
      <div>
        <label class="lbl">✍️ 지문 흐름 요약 (셀프 분석)</label>
        <textarea id="p-flow" class="inp" style="height:100px;" placeholder="지문의 핵심 내용을 정리하세요.">${d.flow}</textarea>
      </div>
    </div>
  `;
}

function renderExplanations() {
  const container = $('expl-container');
  const circled = ['','①','②','③','④','⑤'];
  
  let html = `<h3 style="margin-bottom:15px;">✏️ 오답 셀프 해설지</h3>`;
  ASGN.questions.forEach((q, i) => {
    const e = EXPL[i] || { myAns: null, reason: '', basis: '', classification: '내용이해' };
    html += `
      <div class="card" style="margin-bottom:15px; border-left:5px solid var(--gold);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <strong style="font-size:16px;">${q.num}번 문항</strong>
          <span style="font-size:12px; color:var(--t3);">${q.label}</span>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
          ${[1,2,3,4,5].map(n => `
            <button onclick="setMyAns(${i}, ${n})" style="flex:1; padding:8px; border-radius:5px; border:1px solid var(--border); background:${e.myAns===n?'var(--ink)':'white'}; color:${e.myAns===n?'white':'var(--ink)'}; font-weight:bold; cursor:pointer;">${circled[n]}</button>
          `).join('')}
        </div>
        <div style="margin-bottom:10px;">
          <label class="lbl">오답 원인</label>
          <select id="class-${i}" class="inp" style="margin-bottom:5px;" onchange="saveExpl(${i})">
            <option value="내용이해" ${e.classification==='내용이해'?'selected':''}>내용이해 부족</option>
            <option value="통독미흡" ${e.classification==='통독미흡'?'selected':''}>통독(정독) 미흡</option>
            <option value="어휘력" ${e.classification==='어휘력'?'selected':''}>어휘/개념어 미숙</option>
            <option value="실수" ${e.classification==='실수'?'selected':''}>단순 실수/발문 오독</option>
          </select>
          <textarea id="reason-${i}" class="inp" placeholder="왜 틀렸는지 분석하세요." oninput="saveExpl(${i})">${e.reason}</textarea>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function saveCurrentData() {
  DATA[CUR] = {
    problemLink: $('p-link').value,
    explanationLink: $('e-link').value,
    flow: $('p-flow').value
  };
  localStorage.setItem('data_'+ASGN.title, JSON.stringify(DATA));
}

function setMyAns(qIdx, val) {
  EXPL[qIdx] = EXPL[qIdx] || {};
  EXPL[qIdx].myAns = val;
  saveExpl(qIdx);
  renderExplanations();
}

function saveExpl(i) {
  EXPL[i] = EXPL[i] || {};
  EXPL[i].reason = $(`reason-${i}`).value;
  EXPL[i].classification = $(`class-${i}`).value;
  localStorage.setItem('expl_'+ASGN.title, JSON.stringify(EXPL));
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-panel').forEach((p, i) => p.classList.toggle('active', i===idx));
  if(idx === 0) renderAnalysisResult();
  else renderExplResult();
}

function goReview() {
  saveCurrentData();
  $('view-student').classList.add('hide');
  $('view-review').classList.remove('hide');
  $('mode-chip').textContent = '결과 확인';
  window.scrollTo(0,0);
  switchTab(0);
}

function renderAnalysisResult() {
  $('r-analysis-content').innerHTML = DATA.map((d, i) => `
    <div class="res-item">
      <div class="res-title">${i+1}. ${ASGN.passages[i].title}</div>
      <p style="font-size:13px; margin-bottom:8px; white-space:pre-wrap;">${d.flow || '분석 내용 없음'}</p>
      <div style="font-size:11px; color:var(--t3);">문제지: <span class="res-link">${d.problemLink || '-'}</span></div>
    </div>
  `).join('');
}

function renderExplResult() {
  const circled = ['','①','②','③','④','⑤'];
  $('r-expl-content').innerHTML = ASGN.questions.map((q, i) => {
    const e = EXPL[i] || {};
    const isCorrect = e.myAns === q.ans;
    return `
      <div class="res-item" style="border-left:5px solid ${isCorrect?'var(--green)':'var(--red)'}">
        <div style="display:flex; justify-content:space-between;">
          <span class="res-title">${q.num}번 (${q.label})</span>
          <b style="color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'정답':'오답'}</b>
        </div>
        <div style="font-size:13px; margin:5px 0;">제출: ${circled[e.myAns] || '-'} (정답: ${circled[q.ans]})</div>
        <div style="font-size:12px; background:var(--paper); padding:8px; border-radius:5px;">
          <b>[${e.classification}]</b> ${e.reason || '분석 없음'}
        </div>
      </div>
    `;
  }).join('');
}

function copyKakaoReport() {
  const name = $('s-name').value || '미입력';
  let report = `[📖 ${ASGN.title} 과제 제출]\n학생명: ${name}\n\n`;
  
  report += `■ 지문 핵심 분석\n`;
  ASGN.passages.forEach((p, i) => {
    const d = DATA[i] || {};
    report += `${i+1}. ${p.title}: ${d.flow?.substring(0,30)}...\n`;
  });

  report += `\n■ 오답 분석 요약\n`;
  ASGN.questions.forEach((q, i) => {
    const e = EXPL[i] || {};
    const icon = e.myAns === q.ans ? '◯' : '✕';
    report += `${q.num}번[${icon}] (${e.classification || '미분석'})\n`;
  });

  navigator.clipboard.writeText(report).then(() => toast('💬 보고서가 복사되었습니다!'));
}

window.onload = init;
</script>
</body>
</html>
