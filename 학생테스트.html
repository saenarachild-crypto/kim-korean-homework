<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수능특강 통합 셀프분석 + 카톡 보고서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1e40af;
      --primary-light: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray: #6b7280;
      --light: #f3f4f6;
      --white: #ffffff;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--light);
      margin: 0;
      padding: 16px;
      color: #111827;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.8rem; text-align: center; margin: 1rem 0; color: var(--primary); }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-kakao {
      background: #FEE500;
      color: #3C1E1E;
      font-weight: bold;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 0.95rem;
    }
    .passage-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; }
    .question-block { margin: 1.5rem 0; padding: 1rem; background: #f8fafc; border-radius: 8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>통합 셀프분석 + 셀프해설지</h1>

  <div class="card">
    <div class="passage-title">[예시] 2월 3주차 보강</div>

    <label>이름</label>
    <input type="text" id="studentName" placeholder="홍길동">

    <label>시험 전 전략 / 목표</label>
    <textarea id="preNotes" rows="4" placeholder="예: 비문학 40분 이내 끝내기, 문학 보기 먼저 확인"></textarea>

    <!-- 실제로는 지문별로 반복되는 영역 -->
    <div class="question-block">
      <strong>지문 1. 독서 이론 (능숙한 독자)</strong><br>
      <label>소요 시간</label>
      <input type="text" placeholder="예: 7분 40초" data-passage="1" class="timeTaken">

      <label>지문 분석 요약</label>
      <textarea rows="3" placeholder="주제: 능숙한 독자의 특징 / 흐름: ..." data-passage="1" class="reasoning"></textarea>

      <div style="margin: 1rem 0;">
        <strong>문항</strong>
        <div>1번 - 내 답: <input type="text" size="3" data-q="1"> / 정답: 4 / 난이도: 
          <select data-q="1" class="difficulty">
            <option value="">-</option>
            <option value="O">O (맞음)</option>
            <option value="T">△ (애매)</option>
            <option value="X">X (틀림)</option>
          </select>
        </div>
        <textarea rows="2" placeholder="이 답을 고른 이유 / 틀린 이유" data-q="1" class="q-reasoning"></textarea>
      </div>
      <!-- 다른 문항들도 동일 패턴으로 추가 가능 -->
    </div>

    <!-- 실제 과제라면 위 블록이 여러 개 반복됨 -->

    <label>최종 반성 및 다음 계획</label>
    <textarea id="postNotes" rows="5" placeholder="비문학 시간 관리 미흡 → 매일 1지문 8분 컷 연습"></textarea>

    <div style="margin-top: 2rem; text-align: center;">
      <button class="btn btn-primary" onclick="generateReport()">카카오톡 제출용 보고서 생성</button>
      <button class="btn btn-kakao" id="copyBtn" style="margin-left: 12px; display:none;" onclick="copyToClipboard()">복사하기</button>
    </div>

    <pre id="reportOutput" style="margin-top:1.5rem; white-space:pre-wrap; background:#f1f5f9; padding:1rem; border-radius:8px; display:none;"></pre>
  </div>
</div>

<script>
const reportOutput = document.getElementById('reportOutput');
const copyBtn = document.getElementById('copyBtn');

function generateReport() {
  const name = document.getElementById('studentName').value.trim() || '이름없음';
  const pre = document.getElementById('preNotes').value.trim();
  const post = document.getElementById('postNotes').value.trim();

  let report = `[셀프해설지 제출]\n`;
  report += `시험명: 2월 3주차 보강\n`;
  report += `이름: ${name}\n\n`;

  report += `■ 시험 전 전략\n${pre || '없음'}\n\n`;

  // 실제로는 모든 지문 반복 (여기서는 예시로 1개만)
  report += `▶ 지문 1. 독서 이론 (능숙한 독자)\n`;
  const time = document.querySelector('.timeTaken').value.trim() || '-';
  const reasoning = document.querySelector('.reasoning').value.trim() || '-';
  report += `- 소요 시간: ${time}\n`;
  report += `- 지문 분석: ${reasoning}\n`;

  // 문항 예시 (실제로는 반복)
  report += `  1번 [O] 내답:4  정답:4  (O) / 이유: 보기와 대조하여 가장 적합\n`;

  report += `\n■ 결과: (점수는 수동 입력 또는 계산 필요)\n`;
  report += `\n■ 최종 반성\n${post || '없음'}\n`;

  reportOutput.textContent = report;
  reportOutput.style.display = 'block';
  copyBtn.style.display = 'inline-block';
}

function copyToClipboard() {
  const text = reportOutput.textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('카카오톡에 붙여넣기 가능한 보고서가 복사되었습니다!');
  }).catch(() => {
    alert('복사 실패. 텍스트를 직접 선택해서 복사해주세요.');
  });
}
</script>
</body>
</html>
