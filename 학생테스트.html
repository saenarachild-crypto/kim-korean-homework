<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>수능특강 셀프분석 + 셀프해설지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ===================== RESET & BASE ===================== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C2B4A;
  --ink2:#2D3F60;
  --gold:#B8862A;
  --gold2:#F5EDD6;
  --gold3:#E8D5A0;
  --cream:#F6F1E8;
  --paper:#FDFAF5;
  --lit:#5B3A8C;
  --lit2:#F0EAF8;
  --lit3:#D4C3EE;
  --read:#1A6B5C;
  --read2:#E6F4F1;
  --read3:#B0D9D2;
  --red:#C0392B;
  --red2:#FDEEEC;
  --green:#1E7A4A;
  --green2:#E8F7EE;
  --yellow:#C47A00;
  --yellow2:#FEF8E8;
  --border:#DDD5C2;
  --border2:#EDE8DF;
  --t2:#6B6254;
  --t3:#A09786;
  --card:#FDFAF5;
  --r:12px;
  --shadow:0 2px 12px rgba(28,43,74,.09);
  --shadow2:0 4px 24px rgba(28,43,74,.13);
}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4963a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
input,textarea,select,button{font-family:inherit}
textarea{resize:none}
.hide{display:none!important}
.page{max-width:620px;margin:0 auto;padding-bottom:120px}
.inner{padding:0 16px}
/* ===================== HEADER ===================== */
.app-hd{
  background:var(--ink);
  padding:0 16px;
  position:sticky;top:0;z-index:80;
  display:flex;align-items:center;justify-content:space-between;
  height:54px;
  box-shadow:0 2px 16px rgba(28,43,74,.25);
}
.app-hd .logo-r{display:flex;align-items:center;gap:10px}
.app-hd img{height:28px;object-fit:contain;filter:brightness(0) invert(1);opacity:.9}
.app-hd .brand h1{
  font-family:'Noto Serif KR',serif;
  font-size:13.5px;font-weight:700;
  color:#fff;line-height:1.2;letter-spacing:-.01em;
}
.app-hd .brand p{font-size:9px;font-weight:500;color:var(--gold3);letter-spacing:.15em;text-transform:uppercase;margin-top:1px}
.app-hd .mode-chip{
  font-size:10px;font-weight:700;color:#fff;padding:3px 9px;border-radius:99px;background:var(--gold);
  letter-spacing:.05em;text-transform:uppercase;
}
/* ===================== TOAST ===================== */
#toast{
  position:fixed;z-index:100;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 20px;border-radius:99px;
  font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);
  opacity:0;transition:opacity 0.3s ease;
}
#toast.show{opacity:1}
/* ===================== CARD & FIELD ===================== */
.card{
  background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);
  box-shadow:var(--shadow);padding:20px;
}
.field{margin-bottom:16px}
.lbl{
  font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px;display:block;
}
.inp{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;
  background:var(--paper);font-size:13px;color:var(--ink);line-height:1.5;
  transition:border-color 0.2s ease,box-shadow 0.2s ease;
}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,42,.12);outline:none}
.inp::placeholder{color:var(--t3);font-size:12.5px}
.inp[type="number"]{appearance:textfield}
.inp[type="number"]::-webkit-inner-spin-button, .inp[type="number"]::-webkit-outer-spin-button {appearance:none;margin:0}
.inp[type="date"]{color-scheme:light}
/* ===================== BUTTONS ===================== */
.btn{
  display:inline-block;padding:12px 20px;border-radius:9px;
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s ease;
  text-align:center;
}
.btn-gold{background:var(--gold);color:var(--paper);box-shadow:var(--shadow)}
.btn-gold:hover{background:var(--gold3);box-shadow:var(--shadow2)}
.btn-gold:active{transform:scale(0.98)}
.btn-gold.disabled{background:var(--border);cursor:not-allowed}
.btn-outline{
  border:1.5px solid var(--border);background:transparent;color:var(--ink);
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-kakao{
  background:#FEE500;color:#3C1E1E;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-kakao:hover{background:#FDD800}
/* ===================== SWITCH ===================== */
.switch-wrap{display:flex;gap:12px;align-items:center}
.switch{
  position:relative;width:48px;height:26px;
  background:var(--border2);border-radius:99px;cursor:pointer;
  transition:background 0.2s ease;
}
.switch:before{
  content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
  background:var(--paper);border-radius:50%;transition:left 0.2s ease,background 0.2s ease;
}
.switch.on{background:var(--gold)}
.switch.on:before{left:25px;background:var(--gold2)}
.switch-lbl{font-size:13px;font-weight:700;color:var(--t2)}
/* ===================== TABS ===================== */
.tabs{
  display:flex;border-bottom:1.5px solid var(--border2);
}
.tab-btn{
  flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:700;
  color:var(--t3);border-bottom:2px solid transparent;transition:all 0.2s ease;
}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--gold)}
.tab-content .tab-panel{display:none}
.tab-content .tab-panel.active{display:block}
/* ===================== PROGRESS ===================== */
.progress-bar{
  height:6px;background:var(--border2);border-radius:3px;
  overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--gold);width:0;transition:width 0.3s ease;
}
/* ===================== PASSAGE ===================== */
.passage-panel{
  margin-bottom:16px;
}
.passage-toggle{
  width:100%;padding:14px 18px;border:none;border-radius:9px;
  background:var(--lit2);color:var(--lit);font-size:13px;font-weight:700;
  text-align:left;cursor:pointer;transition:all 0.2s ease;
  display:flex;align-items:center;gap:8px;
}
.passage-toggle.read{background:var(--read2);color:var(--read)}
.passage-toggle.open{border-bottom-left-radius:0;border-bottom-right-radius:0}
.pt-icon{transition:transform 0.2s ease;font-size:10px}
.open .pt-icon{transform:rotate(180deg)}
.passage-body{display:none;padding:16px;background:var(--lit3);border-bottom-left-radius:9px;border-bottom-right-radius:9px}
.passage-body.read{background:var(--read3)}
.passage-body.open{display:block}
/* ===================== REVIEW EXPL ===================== */
.review-expl-card{
  margin-bottom:16px;padding:16px;background:var(--card);
  border:1.5px solid var(--border2);border-radius:var(--r);
}
.review-expl-hd{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.review-expl-num{
  font-size:13px;font-weight:800;background:var(--gold2);color:var(--gold);
  padding:3px 9px;border-radius:6px;
}
.ans-badge{
  font-size:10px;font-weight:700;color:var(--t3);padding:3px 9px;border-radius:99px;
  background:var(--cream);
}
.expl-done-chip{
  font-size:10px;font-weight:700;color:var(--green);padding:3px 9px;border-radius:99px;
  background:var(--green2);
}
.review-expl-section{margin-bottom:12px}
.review-expl-lbl{
  font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px;
}
.review-text{color:var(--ink);line-height:1.5}
/* ===================== COPY REPORT ===================== */
.report-btn{
  width:100%;padding:14px 0;background:var(--green);color:var(--green2);
  border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;
  transition:all 0.2s ease;box-shadow:var(--shadow);
}
.report-btn:hover{background:var(--green2);color:var(--green);box-shadow:var(--shadow2)}
.report-btn:active{transform:scale(0.98)}
/* ===================== PDF EXPORT ===================== */
.pdf-btn{
  width:100%;margin-top:12px;padding:14px 0;background:var(--lit);color:var(--lit2);
  border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;
  transition:all 0.2s ease;box-shadow:var(--shadow);
}
.pdf-btn:hover{background:var(--lit2);color:var(--lit);box-shadow:var(--shadow2)}
.pdf-btn:active{transform:scale(0.98)}
/* ===================== TEACHER VIEW ===================== */
.t-asgn-card{
  margin-bottom:16px;padding:16px;background:var(--card);
  border:1.5px solid var(--border2);border-radius:var(--r);
}
.t-asgn-hd{
  font-size:15px;font-weight:700;margin-bottom:12px;color:var(--ink);
}
.t-asgn-desc{
  font-size:12.5px;color:var(--t3);line-height:1.5;
}
/* ===================== STUDENT VIEW ===================== */
.s-name-field{margin-bottom:24px}
.s-tabs-wrap{
  position:sticky;top:54px;z-index:70;background:var(--cream);padding:12px 16px 0;
  box-shadow:0 2px 12px rgba(28,43,74,.05);
}
.s-tabs{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.s-tabs::-webkit-scrollbar{display:none}
.s-tab-btn{
  padding:8px 14px;background:var(--lit2);color:var(--lit);font-size:12px;font-weight:700;
  border-radius:99px;transition:all 0.2s ease;white-space:nowrap;
}
.s-tab-btn.read{background:var(--read2);color:var(--read)}
.s-tab-btn.active{background:var(--lit);color:var(--lit2)}
.s-tab-btn.active.read{background:var(--read);color:var(--read2)}
.s-progress{margin-top:24px;margin-bottom:16px}
.s-progress-lbl{
  font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px;
}
.form-container{padding:16px}
/* ===================== REVIEW VIEW ===================== */
.r-hd{
  padding:16px 16px 12px;position:sticky;top:54px;z-index:70;
  background:var(--cream);box-shadow:0 2px 12px rgba(28,43,74,.05);
}
.r-title{
  font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px;
}
.r-subtitle{
  font-size:12px;color:var(--t3);line-height:1.5;
}
.r-report-btn-wrap{
  position:fixed;bottom:0;left:0;right:0;padding:12px 16px;z-index:80;
  background:var(--cream);box-shadow:0 -2px 16px rgba(28,43,74,.1);
}
.r-report-btn{
  width:100%;padding:14px 0;background:var(--gold);color:var(--paper);
  border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;
  transition:all 0.2s ease;box-shadow:var(--shadow);
}
.r-report-btn:hover{background:var(--gold3);box-shadow:var(--shadow2)}
.r-report-btn:active{transform:scale(0.98)}
/* ===================== LINK INPUT ===================== */
.link-input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;
  background:var(--paper);font-size:13px;color:var(--ink);line-height:1.5;
  transition:border-color 0.2s ease,box-shadow 0.2s ease;
}
.link-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,42,.12);outline:none}
</style>
<div id="toast"></div>
<header class="app-hd">
  <div class="logo-r">
    <img src="https://storage.googleapis.com/static.run.app/v1/projects/ais-dev-fuzhsbwwctarhrqxe7mief/images/67c5496464f899002c9a9616/1741007204481-%EA%B9%80%ED%98%84%EC%84%9D%EA%B5%AD%EC%96%B4_%EB%A1%9C%EA%B3%A0.png" alt="">
    <div class="brand"><h1>수능특강 셀프분석+해설지</h1><p>Integrated Self-Study Note</p></div>
  </div>
  <span class="mode-chip">학생용</span>
</header>
<div id="view-student" class="page">
  <div class="inner">
    <div class="s-name-field field">
      <label class="lbl">이름</label>
      <input id="s-name" class="inp" placeholder="이름을 입력하세요" oninput="onChange()">
    </div>
    <div class="s-tabs-wrap">
      <div id="s-tabs" class="s-tabs"></div>
    </div>
    <div class="s-progress">
      <label class="lbl">진행도</label>
      <div class="progress-bar">
        <div id="s-progress-fill" class="progress-fill"></div>
      </div>
    </div>
    <div id="form-container" class="form-container"></div>
  </div>
</div>
<div id="view-review" class="page hide">
  <div class="inner">
    <div class="r-hd">
      <div class="r-title">셀프분석 결과</div>
      <div class="r-subtitle">완성된 셀프분석과 셀프해설지를 검토하세요.</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)">셀프분석</button>
      <button class="tab-btn" onclick="switchTab(1)">셀프해설지</button>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="r-analysis-content"></div>
      <div class="tab-panel" id="r-expl-content"></div>
    </div>
  </div>
  <div class="r-report-btn-wrap">
    <button id="r-copy-report" class="r-report-btn">💬 카카오톡 보고서 복사</button>
    <button id="r-pdf-export" class="pdf-btn">📄 PDF 다운로드</button>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
const toast = msg => {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};
const copyToClipboard = (text, msg) => {
  navigator.clipboard.writeText(text).then(() => toast(msg));
};
let ASGN, DATA = [], EXPL = [], CUR = 0;
function loadStudent(asgn){
  ASGN = asgn;
  $('mode-chip').textContent = '학생용';
  $('view-student').classList.remove('hide');
  $('s-name').value = localStorage.getItem('s_name') || '';
  DATA = JSON.parse(localStorage.getItem('data_'+ASGN.title) || '[]');
  EXPL = JSON.parse(localStorage.getItem('expl_'+ASGN.title) || '[]');
  buildStudentTabs();
  renderPassage(0);
  updateProgress();
}
function onChange(){
  localStorage.setItem('s_name', $('s-name').value);
  autoSave();
}
function autoSave(){
  localStorage.setItem('data_'+ASGN.title, JSON.stringify(DATA));
  localStorage.setItem('expl_'+ASGN.title, JSON.stringify(EXPL));
  updateProgress();
}
function updateProgress(){
  const total = ASGN.passages.length;
  const done = DATA.filter(d => d && d.flow).length;
  $('s-progress-fill').style.width = (done / total * 100) + '%';
}
function togglePassage(btn){
  btn.classList.toggle('open');
  btn.nextSibling.classList.toggle('open');
}
function buildStudentTabs(){
  const wrap = $('s-tabs');
  wrap.innerHTML = '';
  wrap.style.display = 'block';
  wrap.style.maxHeight = '520px';
  wrap.style.overflowY = 'auto';
  wrap.style.padding = '12px';
  wrap.style.background = 'var(--paper)';
  wrap.style.borderRadius = '12px';
  wrap.style.border = '1.5px solid var(--border2)';
  ASGN.passages.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.style.width = '100%';
    btn.style.marginBottom = '8px';
    btn.style.padding = '16px';
    btn.style.borderRadius = '12px';
    btn.style.textAlign = 'left';
    btn.style.border = (i===CUR ? '2px solid var(--lit)' : '1.5px solid var(--border2)');
    btn.style.background = (i===CUR ? 'var(--lit2)' : 'white');
    btn.innerHTML = `
      <div style="display:flex;gap:12px;align-items:center">
        <span style="font-size:14px;font-weight:800;background:var(--lit2);color:var(--lit);padding:4px 10px;border-radius:6px;">${i+1}</span>
        <div style="flex:1">
          <div style="font-weight:700;color:var(--ink)">${esc(p.title)}</div>
          <div style="font-size:12px;color:var(--t3)">${esc(p.author || '작자 미상')}</div>
        </div>
      </div>`;
    btn.onclick = () => { saveCurrentPassage(); CUR = i; buildStudentTabs(); renderPassage(i); };
    wrap.appendChild(btn);
  });
}
function renderPassage(i){
  const p = ASGN.passages[i]; const d = DATA[i] || {};
  const isLit = p.type === 'lit';
  let html = `<div class="passage-panel ${isLit?'lit':'read'}">
    <button class="passage-toggle ${isLit?'lit':'read'} open" onclick="togglePassage(this)">
      📖 ${esc(p.title)} <span class="pt-icon">▾</span>
    </button>
    <div class="passage-body open">
      <div class="p-4 bg-white rounded-xl">
        <div class="field"><label class="lbl">📄 문제지 링크</label>
          <input class="link-input" id="link-prob-${i}" value="${esc(d.problemLink||'')}"
                 placeholder="https://..." oninput="onChange()">
        </div>
        <div class="field"><label class="lbl">📘 해설지 링크</label>
          <input class="link-input" id="link-expl-${i}" value="${esc(d.explanationLink||'')}"
                 placeholder="https://..." oninput="onChange()">
        </div>
      </div>
    </div>
  </div>`;
  $('form-container').innerHTML = html;
  if(d.problemLink) $('link-prob-'+i).value = d.problemLink;
  if(d.explanationLink) $('link-expl-'+i).value = d.explanationLink;
}
function saveCurrentPassage(){
  const d = DATA[CUR] = DATA[CUR] || {};
  d.problemLink = $('link-prob-'+CUR)?.value || '';
  d.explanationLink = $('link-expl-'+CUR)?.value || '';
  autoSave();
}
function switchTab(tab){
  // 탭 전환 로직 (원본에 따라)
  // ...
}
function renderExplanations(){
  const container = $('expl-container');
  container.innerHTML = `<div class="card" style="background:#f0f9ff;border-color:#bae6fd">
    <div style="font-size:13px;color:#0c4a6e">✏️ 셀프해설지 — 오답을 선택한 후 분석해주세요</div>
  </div>`;
  const circled = ['','①','②','③','④','⑤'];
  ASGN.questions.forEach((q,i) => {
    const e = EXPL[i] || {};
    let html = `<div class="expl-card" style="border:1.5px solid #bae6fd;padding:20px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-size:22px;font-weight:900;color:#0c4a6e">${q.num}번</span>
        <span id="correct-badge-${i}" style="display:${e.myAns?'inline-block':'none'};background:#e0f2fe;color:#0369a1;padding:6px 18px;border-radius:999px;font-weight:800">정답 ${circled[q.ans]}</span>
      </div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:#0369a1;margin-bottom:8px">내가 고른 오답</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">`;
    
    [1,2,3,4,5].forEach(n => {
      const isSel = e.myAns === n;
      html += `<button onclick="setMyAns(${i},${n},${q.ans})" style="height:44px;border-radius:10px;font-weight:800;${isSel ? (n===q.ans?'background:#d1fae5;color:#166534':'background:#fee2e2;color:#b91c1c') : 'background:white;border:1.5px solid #bae6fd'}">${circled[n]}</button>`;
    });
    html += `</div></div>
      <!-- 문제 분류 -->
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:700;color:#0369a1">문제 분류</label>
        <select id="class-${i}" onchange="saveExplField(${i})" style="width:100%;padding:10px;border-radius:8px">
          <option value="주제파악" ${e.classification==='주제파악'?'selected':''}>주제파악</option>
          <option value="내용이해" ${e.classification==='내용이해'?'selected':''}>내용이해</option>
          <option value="어휘" ${e.classification==='어휘'?'selected':''}>어휘</option>
          <option value="표현법" ${e.classification==='표현법'?'selected':''}>표현법</option>
          <option value="논리구조" ${e.classification==='논리구조'?'selected':''}>논리구조</option>
          <option value="기타" ${e.classification==='기타'?'selected':''}>기타</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:700;color:#0369a1">오답 원인 분석</label>
        <textarea id="er-${i}" rows="3" class="inp" placeholder="왜 틀렸나요? 어떤 부분에서 실수했나요?" oninput="saveExplField(${i})">${esc(e.reason||'')}</textarea>
      </div>
      <div>
        <label style="font-size:12px;font-weight:700;color:#0369a1">정답 근거 정리</label>
        <textarea id="eb-${i}" rows="3" class="inp" placeholder="정답이 정답인 이유를 지문 근거와 함께 설명하세요" oninput="saveExplField(${i})">${esc(e.basis||'')}</textarea>
      </div>
    </div>`;
    container.innerHTML += html;
  });
}
/* 오답 선택 시 정답 배지 표시 */
window.setMyAns = function(i, chosen, correct){
  EXPL[i] = EXPL[i] || {};
  EXPL[i].myAns = chosen;
  autoSave();
  renderExplanations();
};
function saveExplField(i){
  EXPL[i] = EXPL[i] || {};
  EXPL[i].reason = $(`er-${i}`)?.value || '';
  EXPL[i].basis = $(`eb-${i}`)?.value || '';
  EXPL[i].classification = $(`class-${i}`)?.value || '주제파악';
  autoSave();
}
/* ===================== 카톡 보고서 ===================== */
function copyKakaoReport(){
  saveCurrentPassage(); saveAllExplanations();
  const name = $('s-name').value.trim();
  if(!name){ toast('⚠️ 이름을 먼저 입력해주세요'); return; }
  let report = `[📖 셀프해설지 제출]\n`;
  report += `시험명: ${ASGN.title}\n`;
  report += `이름: ${name}\n\n`;
  let totalCorrect = 0, totalQ = 0;
  ASGN.passages.forEach((p, i) => {
    const d = DATA[i] || {};
    report += `▶ 작품 ${i+1} : ${p.title}\n`;
    report += `- 문제지 링크: ${d.problemLink || '미입력'}\n`;
    report += `- 해설지 링크: ${d.explanationLink || '미입력'}\n`;
    report += `- 분석 요약: ${d.flow || '미작성'}\n`;
    if(d.questions){
      d.questions.forEach(q => {
        totalQ++;
        const status = q.status || '미평가';
        const icon = status==='correct'?'◯':status==='uncertain'?'△':status==='wrong'?'✕':'-';
        if(status==='correct') totalCorrect++;
        report += `   ${q.num}번 [${icon}] 정답 ${q.ansLabel||'-'} / 이유: ${q.analysis||'-'}\n`;
      });
    }
    if(d.feedback) report += `- 학습 성찰: ${d.feedback}\n`;
    report += `\n`;
  });
  const percent = totalQ ? Math.round((totalCorrect/totalQ)*100) : 0;
  report += `■ 결과: ${percent}점 (${totalCorrect}/${totalQ})\n\n`;
  report += `■ 최종 반성\n${DATA.map((d,i)=>d.feedback?`작품${i+1}: ${d.feedback}`:'').filter(Boolean).join('\n') || '미작성'}\n`;
  copyToClipboard(report, '💬 카카오톡 제출용 보고서가 복사되었습니다!');
}
