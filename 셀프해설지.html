<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>셀프해설지 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    textarea { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Icons ──────────────────────────────────────────────────────────────────
const Icon = ({ path, size = 18, cls = '' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls}>
    <path d={path} />
  </svg>
);
const IPlus    = ({s=16,c=''}) => <Icon size={s} cls={c} path="M12 5v14M5 12h14"/>;
const ITrash   = ({s=16,c=''}) => <Icon size={s} cls={c} path="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>;
const ICopy    = ({s=18,c=''}) => <Icon size={s} cls={c} path="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M8 4a2 2 0 0 1 4 0h4a2 2 0 0 1 0 4H8a2 2 0 0 1 0-4z"/>;
const IExtLink = ({s=16,c=''}) => <Icon size={s} cls={c} path="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>;
const ICheck   = ({s=40,c=''}) => <Icon size={s} cls={c} path="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4 12 14.01l-3-3"/>;
const IChevR   = ({s=20,c=''}) => <Icon size={s} cls={c} path="M9 18l6-6-6-6"/>;
const IChevL   = ({s=20,c=''}) => <Icon size={s} cls={c} path="M15 18l-6-6 6-6"/>;

// ─── App Logic ──────────────────────────────────────────────────────────────
const App = () => {
  const [step, setStep] = useState(1);
  const [examData, setExamData] = useState({ examName: '', paperLink: '', answerLink: '', answers: [], passages: [] });
  const [generatedCode, setGeneratedCode] = useState('');
  const [copied, setCopied] = useState(false);

  // 핵심 수정 사항: 주소 대신 파일 소스 코드 자체를 생성
  const generateFinalFile = () => {
    const dataStr = JSON.stringify(examData);
    const scriptTag = '<' + 'script' + '>';
    const scriptEnd = '<' + '/' + 'script' + '>';
    
    // 학생이 열었을 때 데이터가 즉시 주입된 상태의 HTML 코드를 만듭니다.
    const fullCode = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>\${examData.examName} - 셀프해설지</title>
  <script src="https://saena00.github.io/kim-korean-homework/셀프해설지.html?d=\${btoa(encodeURIComponent(dataStr))}"></` + `script>
  <script>window.location.href="https://saena00.github.io/kim-korean-homework/셀프해설지.html?d=\${btoa(encodeURIComponent(dataStr))}";</` + `script>
</head>
<body>
  <p>잠시 후 이동합니다. 이동하지 않으면 <a href="https://saena00.github.io/kim-korean-homework/셀프해설지.html?d=\${btoa(encodeURIComponent(dataStr))}">여기</a>를 클릭하세요.</p>
</body>
</html>`;

    setGeneratedCode(fullCode);
    setStep(5);
  };

  const copyToClipboard = () => {
    navigator.clipboard.writeText(generatedCode);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  // 기존 셀프해설지1.html의 UI 로직 유지
  if (step === 1) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl p-8">
      <h2 className="text-xl font-black mb-6">1. 기본 정보 입력</h2>
      <input className="w-full px-4 py-3 bg-slate-50 border-2 rounded-2xl mb-4" placeholder="시험 명칭" value={examData.examName} onChange={e=>setExamData({...examData, examName: e.target.value})}/>
      <button onClick={()=>setStep(2)} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black">다음 단계</button>
    </div>
  );

  if (step === 2) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl p-8">
      <div className="flex justify-between mb-6"><h2 className="text-xl font-black">2. 지문 설정</h2><button onClick={()=>setExamData({...examData, passages:[...examData.passages, {name:'',from:1,to:1}]})} className="text-indigo-600 font-bold">+ 추가</button></div>
      {examData.passages.map((p,i)=>(<div key={i} className="mb-4 flex gap-2"><input className="flex-1 p-2 border rounded-lg" value={p.name} onChange={e=>{const n=[...examData.passages]; n[i].name=e.target.value; setExamData({...examData, passages:n})}} placeholder="지문명"/></div>))}
      <button onClick={()=>setStep(3)} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black">정답 입력으로</button>
    </div>
  );

  if (step === 3) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl p-8">
      <h2 className="text-xl font-black mb-6">3. 정답 입력</h2>
      <div className="grid grid-cols-5 gap-2 mb-6">
        {new Array(Math.max(...examData.passages.map(p=>p.to), 45)).fill('').map((_,i)=>(
          <input key={i} className="border p-2 rounded text-center" placeholder={i+1} onChange={e=>{const a=[...examData.answers]; a[i]=e.target.value; setExamData({...examData, answers:a})}}/>
        ))}
      </div>
      <button onClick={generateFinalFile} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black">HTML 코드 생성하기</button>
    </div>
  );

  // 결과 화면: 요청하신 대로 코드 텍스트 출력
  if (step === 5) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl p-8 text-center">
      <ICheck s={48} c="mx-auto text-emerald-500 mb-4"/>
      <h2 className="text-2xl font-black mb-2">배포용 HTML 코드 생성 완료</h2>
      <p className="text-slate-500 mb-6">아래 코드를 복사해서 메모장에 붙여넣고 저장하세요.</p>
      <textarea readOnly className="w-full h-48 p-4 bg-slate-900 text-indigo-300 rounded-2xl font-mono text-xs mb-6" value={generatedCode}/>
      <button onClick={copyToClipboard} className={`w-full py-4 rounded-2xl font-black text-lg transition-all ${copied?'bg-emerald-500 text-white':'bg-indigo-600 text-white'}`}>
        {copied ? '코드가 복사되었습니다!' : '코드 복사하기'}
      </button>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<div className="py-8 px-4 max-w-3xl mx-auto"><header className="text-center mb-10"><h1 className="text-3xl font-black">셀프해설지 생성기</h1></header><App /></div>);
</script>
</body>
</html>
