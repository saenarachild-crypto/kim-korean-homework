<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>수능특강 셀프분석 + 셀프해설지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C2B4A; --ink2:#2D3F60;
  --gold:#B8862A; --gold2:#F5EDD6; --gold3:#E8D5A0;
  --cream:#F6F1E8; --paper:#FDFAF5;
  --lit:#5B3A8C; --lit2:#F0EAF8; --lit3:#D4C3EE;
  --read:#1A6B5C; --read2:#E6F4F1; --read3:#B0D9D2;
  --red:#C0392B; --red2:#FDEEEC;
  --green:#1E7A4A; --green2:#E8F7EE;
  --yellow:#C47A00; --yellow2:#FEF8E8;
  --border:#DDD5C2; --border2:#EDE8DF;
  --t2:#6B6254; --t3:#A09786;
  --card:#FDFAF5; --r:12px;
  --shadow:0 2px 12px rgba(28,43,74,.09);
}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:var(--cream);color:var(--ink);min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c4963a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
input,textarea,select,button{font-family:inherit}
textarea{resize:none}
.hide{display:none!important}
.page{max-width:620px;margin:0 auto;padding-bottom:120px}
.inner{padding:0 16px}

/* ─── HEADER ─── */
.app-hd{background:var(--ink);padding:0 16px;position:sticky;top:0;z-index:80;display:flex;align-items:center;justify-content:space-between;height:54px;box-shadow:0 2px 16px rgba(28,43,74,.25)}
.app-hd .brand h1{font-family:'Noto Serif KR',serif;font-size:13.5px;font-weight:700;color:#fff;line-height:1.2}
.app-hd .brand p{font-size:9px;font-weight:500;color:var(--gold3);letter-spacing:.15em;text-transform:uppercase;margin-top:1px}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:99px;font-size:12.5px;font-weight:700;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;z-index:300;border:1px solid rgba(184,134,42,.3);box-shadow:0 8px 32px rgba(28,43,74,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── CARDS ─── */
.card{background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px;margin-bottom:16px;color:var(--ink)}
.card-ttl::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px;flex-shrink:0}
.card-ttl.read-ttl{color:var(--read)}.card-ttl.read-ttl::before{background:var(--read)}

/* ─── FORM ─── */
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
label.lbl{display:block;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.inp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;background:var(--paper);transition:border-color .18s,box-shadow .18s;color:var(--ink);line-height:1.6}
.inp:focus{outline:none;box-shadow:0 0 0 3px rgba(184,134,42,.12)}
.inp.read:focus{border-color:var(--read);box-shadow:0 0 0 3px rgba(26,107,92,.1)}

/* ─── STATUS BUTTONS ─── */
.st-row{display:flex;gap:5px}
.st-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .18s;flex-shrink:0}
.st-btn.on-c{background:var(--green);border-color:var(--green);color:#fff}
.st-btn.on-u{background:var(--yellow);border-color:var(--yellow);color:#fff}
.st-btn.on-w{background:var(--red);border-color:var(--red);color:#fff}

/* ─── PASSAGE PANEL ─── */
.passage-panel{border-radius:var(--r);margin-bottom:12px;overflow:hidden;border:1.5px solid var(--border)}
.passage-panel.read{border-color:var(--read3)}
.passage-body{max-height:0;overflow:hidden;transition:max-height .35s ease;background:#fafaf7}
.passage-body.open{max-height:600px;overflow-y:auto}
.passage-text{padding:16px 18px;font-size:13px;line-height:2.1;white-space:pre-wrap;color:#2d2d2d;border-top:1px solid var(--border2)}

/* ─── PARA BLOCK ─── */
.para-blk{background:var(--cream);border:1px solid var(--border2);border-radius:10px;padding:13px;margin-bottom:8px}
.para-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.para-num{font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px}
.para-num.read{color:var(--read);background:var(--read2)}

/* ─── QUESTION BLOCK ─── */
.q-blk{border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:8px}
.q-hd{background:var(--cream);border-bottom:1px solid var(--border2);padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.q-num{font-size:11px;font-weight:800;color:var(--t2)}.q-body{padding:10px 12px}

/* ─── BUTTONS ─── */
.btn{padding:12px 20px;border:none;border-radius:11px;font-size:13.5px;font-weight:800;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;justify-content:center}
.btn-p{background:var(--ink);color:#fff;box-shadow:0 4px 16px rgba(28,43,74,.25)}
.btn-p:hover{background:var(--ink2);transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:#fff;box-shadow:0 4px 16px rgba(184,134,42,.3)}
.btn-gold:hover{opacity:.9;transform:translateY(-1px)}

/* ─── ACTION BAR ─── */
.act-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(253,250,245,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border2);padding:11px 16px 28px;z-index:70}
.act-bar-in{max-width:620px;margin:0 auto;display:flex;gap:8px}

/* PDF 출력 최적화 */
@media print {
  .app-hd, .act-bar, #toast { display: none !important; }
  body { background: white !important; }
  .page { max-width: none; padding: 0; margin: 0; }
  .passage-body { max-height: none !important; overflow: visible !important; height: auto !important; }
  .para-blk, .q-blk { page-break-inside: avoid; margin-bottom: 16px; }
}
</style>
</head>
<body>

<div id="toast"></div>

<div class="page">
  <div class="app-hd">
    <div class="brand">
      <h1>수능특강 셀프분석 + 셀프해설지</h1>
    </div>
  </div>

  <div class="inner">

    <div class="card">
      <div class="card-ttl read-ttl">진행 상황</div>
      <div class="prog-wrap"><div id="prog-fill" class="prog-fill" style="width:0%;background:var(--read)"></div></div>
      <div id="prog-text" style="text-align:center;font-size:13px;color:var(--t3)">0 / 13 완료</div>
    </div>

    <div id="passage-panel" class="passage-panel read">
      <div class="passage-body open" id="passage-body">
        지문을 여기에 붙여넣으세요<br><br>(복사 → 붙여넣기 권장)
      </div>
    </div>

    <div class="field" style="margin:16px 0;">
      <label class="lbl">지문 텍스트 입력</label>
      <textarea id="passage-input" class="inp" rows="6" placeholder="지문을 여기에 붙여넣으세요..." oninput="savePassageText(this.value)"></textarea>
    </div>

    <div id="para-container"></div>
    <div id="q-container"></div>

  </div>
</div>

<div class="act-bar">
  <div class="act-bar-in">
    <button class="btn btn-p" onclick="exportPdf()">PDF 저장</button>
    <button class="btn btn-gold" onclick="autoSave()">임시저장</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
let CUR = 0;
let DATA = [];
let ATTEMPTS = [];

const ASGN = window.__BAKED_ASGN__;

// ────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function toast(msg, ms = 2000) {
  const t = $('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  if (toast._timer) clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), ms);
}

// ────────────────────────────────────────────────
function ensureDataShape() {
  if (!Array.isArray(DATA)) DATA = [];
  if (!Array.isArray(ATTEMPTS)) ATTEMPTS = [];

  while (DATA.length < ASGN.passages.length) {
    DATA.push({ paras: [] });
  }
  for (let i = 0; i < DATA.length; i++) {
    if (!DATA[i] || typeof DATA[i] !== 'object') DATA[i] = { paras: [] };
    if (!Array.isArray(DATA[i].paras)) DATA[i].paras = [];
  }

  const totalQs = ASGN.questions?.length || 0;
  while (ATTEMPTS.length < totalQs) {
    ATTEMPTS.push({ history: [], locked: false, correct: false, selected: null });
  }
  for (let i = 0; i < ATTEMPTS.length; i++) {
    const a = ATTEMPTS[i];
    if (!a || typeof a !== 'object') {
      ATTEMPTS[i] = { history: [], locked: false, correct: false, selected: null };
      continue;
    }
    if (!Array.isArray(a.history)) a.history = [];
    if (typeof a.locked !== 'boolean') a.locked = false;
    if (typeof a.correct !== 'boolean') a.correct = false;
    if (!('selected' in a)) a.selected = null;
  }
}

// ────────────────────────────────────────────────
function savePara(pidx, paraIdx, field, value) {
  ensureDataShape();
  DATA[pidx] = DATA[pidx] || { paras: [] };
  DATA[pidx].paras[paraIdx] = DATA[pidx].paras[paraIdx] || {};
  DATA[pidx].paras[paraIdx][field] = String(value ?? '').trim();
  autoSave();
}

function savePassageText(value) {
  ensureDataShape();
  DATA[CUR] = DATA[CUR] || { paras: [] };
  DATA[CUR].userText = String(value ?? '');
  const body = $('passage-body');
  if (body) body.innerHTML = esc(value).replace(/\n/g, '<br>');
  autoSave();
}

function chooseAnswer(qIdx, chosen, correctAns) {
  ensureDataShape();
  const att = ATTEMPTS[qIdx];
  if (!att || att.locked) return;

  if (!correctAns || correctAns < 1 || correctAns > 5) {
    toast('이 문제는 정답이 설정되지 않았습니다.', 3000);
    return;
  }

  const isCorrect = Number(chosen) === Number(correctAns);

  att.history.push({ myAns: Number(chosen), correct: isCorrect });
  att.selected = Number(chosen);
  att.correct = isCorrect;
  att.locked = isCorrect || att.history.length >= 3;

  renderPassage(CUR);
  updateProgress();
  autoSave();

  if (isCorrect) toast('정답입니다 ✓', 1800);
  else if (att.locked) toast(`도전 종료 ✕ (정답: ${['①','②','③','④','⑤'][correctAns-1]})`, 2800);
  else toast('오답입니다. 다시 도전해 보세요.', 1800);
}

function updateProgress() {
  ensureDataShape();
  let done = 0;
  DATA.forEach(d => {
    if (d.paras?.some(p => (p.keyword?.trim() || p.point?.trim()))) done++;
  });
  const total = ASGN.passages.length || 0;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  const fill = $('prog-fill');
  if (fill) fill.style.width = pct + '%';

  const txt = $('prog-text');
  if (txt) txt.textContent = `${done} / ${total} 완료 (${pct}%)`;
}

// ────────────────────────────────────────────────
function autoSave() {
  try {
    ensureDataShape();
    const snap = {
      cur: CUR,
      data: DATA,
      attempts: ATTEMPTS,
      name: $('s-name')?.value?.trim() || '',
      timestamp: Date.now()
    };
    const compressed = LZString.compressToUTF16(JSON.stringify(snap));
    localStorage.setItem('dokseo_self_2027', compressed);
  } catch (e) {
    console.warn("[autoSave] localStorage 저장 실패:", e);
  }
}

// ────────────────────────────────────────────────
async function exportPdf() {
  // PDF 출력 전 모든 passage-body 펼치기
  const bodies = document.querySelectorAll('.passage-body');
  const originals = [];
  bodies.forEach((el, i) => {
    originals[i] = el.style.maxHeight;
    el.style.maxHeight = 'none';
    el.style.overflow = 'visible';
    el.style.height = 'auto';
  });

  const el = document.querySelector('.page');
  const name = $('s-name')?.value?.trim() || '학생';

  const opt = {
    margin: [12, 10, 18, 10],
    filename: `2027독서셀프_${name}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css'] }
  };

  toast('PDF 생성 중...', 3000);

  try {
    await html2pdf().set(opt).from(el).save();
    toast('저장 완료!', 2500);
  } catch (e) {
    console.error(e);
    toast('PDF 생성 실패 — 브라우저 인쇄 → PDF로 저장해 보세요', 5000);
    window.print();
  } finally {
    // 복원
    bodies.forEach((el, i) => {
      el.style.maxHeight = originals[i] || '600px';
    });
  }
}

// ────────────────────────────────────────────────
function renderPassage(idx) {
  ensureDataShape();
  if (!ASGN?.passages?.[idx]) return;

  CUR = idx;
  const p = ASGN.passages[idx];
  const d = DATA[idx] = DATA[idx] || { paras: [] };

  // 제목 / 페이지
  const titleEl = document.querySelector('#passage-title') || $('passage-title');
  const pagesEl = document.querySelector('#passage-pages') || $('passage-pages');
  if (titleEl) titleEl.textContent = esc(p.title || `지문 ${idx + 1}`);
  if (pagesEl) pagesEl.textContent = p.pages ? `${esc(p.pages)}쪽` : '';

  // 지문 본문
  const body = $('passage-body');
  if (body) {
    const text = d.userText || '지문을 여기에 붙여넣으세요\n\n(복사 → 붙여넣기)';
    body.innerHTML = esc(text).replace(/\n/g, '<br>');
    body.classList.add('open');
  }

  // 입력창 동기화
  const input = $('passage-input');
  if (input) input.value = d.userText || '';

  // 단락
  let paraWrap = $('para-container');
  if (!paraWrap) {
    paraWrap = document.createElement('div');
    paraWrap.id = 'para-container';
    const panel = document.querySelector('#passage-panel') || document.body;
    panel.appendChild(paraWrap);
  }
  paraWrap.innerHTML = '';

  const paraCount = Number(p.paras) || 4;
  for (let i = 0; i < paraCount; i++) {
    const para = d.paras[i] = d.paras[i] || {};
    const blk = document.createElement('div');
    blk.className = 'para-blk';
    blk.innerHTML = `
      <div class="para-hd">
        <span class="para-num read">PARA ${i + 1}</span>
        <select class="method-sel" onchange="savePara(${idx},${i},'method',this.value)">
          <option value="정독" ${para.method === '정독' ? 'selected' : ''}>정독</option>
          <option value="SQ3R" ${para.method === 'SQ3R' ? 'selected' : ''}>SQ3R</option>
          <option value="스키밍" ${para.method === '스키밍' ? 'selected' : ''}>스키밍</option>
        </select>
      </div>
      <input class="inp" placeholder="핵심 키워드 / 주제어" value="${esc(para.keyword || '')}" 
             oninput="savePara(${idx},${i},'keyword',this.value)">
      <textarea class="inp" rows="3" placeholder="단락의 핵심 주장 · 논리 전개 요약" 
                oninput="savePara(${idx},${i},'point',this.value)">${esc(para.point || '')}</textarea>
    `;
    paraWrap.appendChild(blk);
  }

  // 문제
  let qWrap = $('q-container');
  if (!qWrap) {
    qWrap = document.createElement('div');
    qWrap.id = 'q-container';
    const panel = document.querySelector('#passage-panel') || document.body;
    panel.appendChild(qWrap);
  }
  qWrap.innerHTML = '<div class="card-ttl expl-ttl">문제 도전</div>';

  let startQIdx = 0;
  for (let i = 0; i < idx; i++) {
    startQIdx += Number(ASGN.passages[i]?.qs || 0);
  }

  const qs = Number(p.qs) || 1;
  for (let qi = 0; qi < qs; qi++) {
    const qIdx = startQIdx + qi;
    const q = ASGN.questions?.[qIdx] || {};
    const att = ATTEMPTS[qIdx] = ATTEMPTS[qIdx] || {
      history: [], locked: false, correct: false, selected: null
    };

    const displayNum = q.num || (startQIdx + qi + 1);

    const blk = document.createElement('div');
    blk.className = 'q-blk';
    blk.innerHTML = `
      <div class="q-hd">
        <span class="q-num">${esc(displayNum)}번</span>
      </div>
      <div class="q-body">
        <div class="st-row">
          ${[1,2,3,4,5].map(n => `
            <button class="st-btn ${
              att.selected === n
                ? (att.correct ? 'on-c' : (att.locked ? 'on-w' : ''))
                : ''
            }"
              onclick="chooseAnswer(${qIdx}, ${n}, ${Number(q.ans) || 0})"
              ${att.locked ? 'disabled' : ''}>
              ${['①','②','③','④','⑤'][n-1]}
            </button>
          `).join('')}
        </div>
        <div style="margin-top:8px;text-align:center;font-size:12px;color:var(--t3)">
          시도 ${att.history.length || 0} / 3 ${att.locked ? '(종료)' : ''}
        </div>
      </div>
    `;
    qWrap.appendChild(blk);
  }

  updateProgress();
  autoSave();
}

// ────────────────────────────────────────────────
window.addEventListener('load', () => {
  let loaded = false;

  try {
    const saved = localStorage.getItem('dokseo_self_2027');
    if (saved) {
      const raw = LZString.decompressFromUTF16(saved);
      if (raw) {
        const snap = JSON.parse(raw);
        CUR = Number(snap.cur) || 0;
        DATA = Array.isArray(snap.data) ? snap.data : [];
        ATTEMPTS = Array.isArray(snap.attempts) ? snap.attempts : [];
        if (snap.name && $('s-name')) $('s-name').value = snap.name;
        toast('이어서 불러왔습니다', 2200);
        loaded = true;
      }
    }
  } catch (e) {
    console.warn("[load] localStorage 복원 실패:", e);
  }

  ensureDataShape();

  if (CUR < 0 || CUR >= ASGN.passages.length) CUR = 0;

  renderPassage(CUR);
});
</script>
