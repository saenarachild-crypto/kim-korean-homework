<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>셀프해설지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    textarea { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Icons (원본 SVG 보존) ──────────────────────────────────────────────────
const Icon = ({ path, size = 18, cls = '' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls}>
    <path d={path} />
  </svg>
);
const IPlus    = ({s=16}) => <Icon size={s} path="M12 5v14M5 12h14"/>;
const ITrash   = ({s=16}) => <Icon size={s} path="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>;
const ICopy    = ({s=18}) => <Icon size={s} path="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M8 4a2 2 0 0 1 4 0h4a2 2 0 0 1 0 4H8a2 2 0 0 1 0-4z"/>;
const IChevR   = ({s=20}) => <Icon size={s} path="M9 18l6-6-6-6"/>;
const ICheck   = ({s=40}) => <Icon size={s} path="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4 12 14.01l-3-3"/>;

const App = () => {
  const [step, setStep] = useState(1);
  const [examData, setExamData] = useState({ examName: '', paperLink: '', answerLink: '', answers: [], passages: [] });
  const [studentCode, setStudentCode] = useState('');
  const [copied, setCopied] = useState(false);

  // ─── 핵심: 메모장용 HTML 생성 (안전한 텍스트 처리) ───
  const generateStudentCode = () => {
    const dataString = JSON.stringify(examData);
    const encodedData = btoa(encodeURIComponent(dataString));
    const finalUrl = `https://saena00.github.io/kim-korean-homework/셀프해설지.html?d=${encodedData}`;
    
    // </script> 태그 분할 처리로 브라우저 충돌 방지
    const scriptEnd = "<" + "/script" + ">";
    const fullHtml = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>${examData.examName || "셀프해설지"}</title>
  <script>window.location.href="${finalUrl}";${scriptEnd}
</head>
<body>
  <p>해설지로 이동 중입니다. <a href="${finalUrl}">여기</a>를 클릭하세요.</p>
</body>
</html>`;
    
    setStudentCode(fullHtml);
    setStep(5);
  };

  const copyToClipboard = () => {
    navigator.clipboard.writeText(studentCode);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  // Step 1: 기본 정보 (원본 UI)
  if (step === 1) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-8 border border-slate-100">
      <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
        <span className="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-sm font-bold">1</span> 기본 정보 입력
      </h2>
      <div className="space-y-5">
        <input className="w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-500 outline-none" placeholder="시험 명칭" value={examData.examName} onChange={e => setExamData({...examData, examName: e.target.value})} />
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input className="w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500" placeholder="시험지 링크" value={examData.paperLink} onChange={e => setExamData({...examData, paperLink: e.target.value})} />
          <input className="w-full px-4 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500" placeholder="정답지 링크" value={examData.answerLink} onChange={e => setExamData({...examData, answerLink: e.target.value})} />
        </div>
        <button onClick={() => setStep(2)} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg flex items-center justify-center gap-2 mt-4 transition-all active:scale-95">다음 단계로 <IChevR /></button>
      </div>
    </div>
  );

  // Step 2: 지문 설정 (원본 UI)
  if (step === 2) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
      <div className="flex justify-between items-end mb-6">
        <h2 className="text-xl font-black text-slate-800 flex items-center gap-2"><span className="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-sm font-bold">2</span> 지문 설정</h2>
        <button onClick={()=>setExamData({...examData, passages:[...examData.passages, {name:'', from:1, to:1}]})} className="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-sm hover:bg-indigo-100 flex items-center gap-1.5"><IPlus /> 지문 추가</button>
      </div>
      <div className="space-y-4 mb-8">
        {examData.passages.map((p, idx) => (
          <div key={idx} className="p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 flex gap-4 items-center">
            <input className="flex-grow p-2 rounded-lg border font-bold outline-none" placeholder="지문 제목" value={p.name} onChange={e=>{const n=[...examData.passages]; n[idx].name=e.target.value; setExamData({...examData, passages:n})}}/>
            <div className="flex items-center gap-2">
              <input type="number" className="w-16 p-2 rounded-lg border text-center font-bold" value={p.from} onChange={e=>{const n=[...examData.passages]; n[idx].from=parseInt(e.target.value); setExamData({...examData, passages:n})}}/>
              <span className="font-bold text-slate-400">~</span>
              <input type="number" className="w-16 p-2 rounded-lg border text-center font-bold" value={p.to} onChange={e=>{const n=[...examData.passages]; n[idx].to=parseInt(e.target.value); setExamData({...examData, passages:n})}}/>
            </div>
            <button onClick={()=>{const n=[...examData.passages]; n.splice(idx,1); setExamData({...examData, passages:n})}} className="text-slate-300 hover:text-red-500 transition-colors"><ITrash /></button>
          </div>
        ))}
      </div>
      <button onClick={()=>{const maxQ = Math.max(...examData.passages.map(p=>p.to), 0) || 45; setExamData({...examData, answers: new Array(maxQ).fill('')}); setStep(3);}} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">정답 입력으로</button>
    </div>
  );

  // Step 3: 정답 입력 (원본 UI)
  if (step === 3) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
      <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-2"><span className="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-sm font-bold">3</span> 정답 정보 입력</h2>
      <div className="grid grid-cols-5 sm:grid-cols-9 gap-3 mb-8">
        {examData.answers.map((ans, i) => (
          <div key={i} className="flex flex-col gap-1.5 text-center font-bold">
            <span className="text-[10px] text-slate-400">{i+1}</span>
            <input className="w-full h-11 bg-slate-50 border-2 rounded-xl text-center text-indigo-600 focus:border-indigo-500 outline-none" value={ans} onChange={e=>{const a=[...examData.answers]; a[i]=e.target.value; setExamData({...examData, answers:a})}}/>
          </div>
        ))}
      </div>
      <button onClick={generateStudentCode} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg transition-all active:scale-95">학생 배포용 HTML 코드 생성</button>
    </div>
  );

  // Step 5: 최종 코드 결과 (수정된 핵심 부분 - 디자인 100% 동일)
  if (step === 5) return (
    <div className="fade-in bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-10 border border-slate-100 text-center">
      <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6"><ICheck s={48} /></div>
      <h2 className="text-2xl font-black text-slate-800 mb-2">HTML 코드 생성 완료</h2>
      <p className="text-slate-500 font-bold mb-8 text-sm">아래 코드를 복사해서 메모장에 붙여넣고 저장하세요.</p>
      
      <div className="bg-slate-900 rounded-2xl p-6 mb-8 text-left border-4 border-slate-800 shadow-inner">
        <pre className="text-indigo-300 font-mono text-[11px] leading-relaxed overflow-x-auto whitespace-pre h-64 scrollbar-thin scrollbar-thumb-slate-700">
          {studentCode}
        </pre>
      </div>

      <div className="flex flex-col gap-3">
        <button onClick={copyToClipboard} className={`w-full py-4 rounded-2xl font-black text-lg transition-all flex items-center justify-center gap-2 ${copied ? 'bg-emerald-500 text-white' : 'bg-[#FEE500] hover:bg-[#FDD800] text-black shadow-lg shadow-yellow-100'}`}>
          <ICopy s={22}/>{copied ? '복사되었습니다!' : 'HTML 코드 복사하기'}
        </button>
        <button onClick={()=>setStep(1)} className="w-full py-4 text-slate-400 font-black hover:text-slate-600 transition-colors">처음으로 돌아가기</button>
      </div>
    </div>
  );

  return null;
};

const Root = () => (
  <div className="py-8 px-4 max-w-3xl mx-auto">
    <header className="text-center mb-10">
      <h1 className="text-4xl font-black text-slate-900 italic tracking-tighter underline decoration-indigo-500 underline-offset-8">셀프해설지</h1>
      <p className="text-slate-400 font-bold mt-5 text-[10px] tracking-[0.2em] uppercase">Teacher Admin System</p>
    </header>
    <App />
  </div>
);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
</script>
</body>
</html>
